version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: vocabai_db
    environment:
      POSTGRES_USER: vocabai
      POSTGRES_PASSWORD: vocabai_pass
      POSTGRES_DB: vocabai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocabai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vocabai_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://vocabai:vocabai_pass@db:5432/vocabai
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars-min}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vocabai_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
